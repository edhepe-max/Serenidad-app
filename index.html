<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05070d">

<title>Serenidad Studio | Sonidos Ambientales</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg-dark: #05070d;
    --glass-bg: rgba(18, 22, 35, 0.3);
    --glass-border: rgba(255, 255, 255, 0.05);
    --text-main: #f8fafc;
    --text-muted: #64748b;
    --primary: #7ec8c8;
    --accent: #a78bfa;
  }

  html, body {
    height: 100%;
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Outfit', sans-serif;
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* Fondo Sutil */
  .ambient-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(circle at 20% 30%, rgba(126, 200, 200, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(167, 139, 250, 0.03) 0%, transparent 40%);
    filter: blur(30px);
  }

  /* Contenedor Compacto */
  .app-container {
    position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; 
    padding: 0 0 160px; max-width: 600px; margin: 0 auto;
  }

  header { padding: 40px 20px 20px; text-align: center; }
  header h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 2.4rem; letter-spacing: 0.1em; }
  header h1 em { font-style: italic; color: var(--primary); }
  header p { margin-top: 6px; font-size: 0.75rem; font-weight: 300; letter-spacing: 0.2em; color: var(--text-muted); text-transform: uppercase; }
  
  /* Seccion de Combinaciones (Presets) */
  .presets-container {
    display: flex; gap: 10px; overflow-x: auto; padding: 0 24px 20px; 
    scrollbar-width: none; /* Firefox */
  }
  .presets-container::-webkit-scrollbar { display: none; /* Chrome */ }
  
  .preset-btn {
    flex: 0 0 auto; padding: 10px 18px; border-radius: 20px; border: 1px solid var(--glass-border);
    background: var(--glass-bg); color: var(--text-main); font-family: 'Outfit', sans-serif;
    font-size: 0.75rem; font-weight: 300; cursor: pointer; transition: all 0.3s;
    backdrop-filter: blur(10px); display: flex; align-items: center; gap: 6px;
  }
  .preset-btn:active { transform: scale(0.95); }
  .preset-btn.active-preset { background: rgba(126, 200, 200, 0.15); border-color: rgba(126, 200, 200, 0.4); color: var(--primary); }

  /* Cuadrícula Compacta */
  .sound-grid { 
    display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); 
    gap: 12px; padding: 0 24px; 
  }

  .card {
    background: var(--glass-bg); border: 1px solid var(--glass-border); 
    border-radius: 18px; padding: 15px 0 10px; 
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.4s; user-select: none; position: relative; overflow: hidden;
    aspect-ratio: 1/1.2;
  }
  
  .card.is-active { 
    border-color: var(--card-color); background: rgba(18, 22, 35, 0.8); 
    box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
  }
  
  .icon-wrap { font-size: 1.8rem; line-height: 1; transition: all 0.4s; z-index: 2; margin-bottom: 8px; }
  .card.is-active .icon-wrap { filter: drop-shadow(0 0 10px var(--card-color)); transform: scale(1.05); }

  /* Volumen individual más limpio */
  .vol-control { 
    width: 75%; position: absolute; bottom: 8px; opacity: 0; transform: translateY(5px); 
    transition: all 0.3s; pointer-events: none; z-index: 3; display: flex; flex-direction: column; align-items: center;
  }
  .card.is-active .vol-control { opacity: 1; transform: translateY(0); pointer-events: auto; }
  
  .custom-slider {
    -webkit-appearance: none; width: 100%; height: 2px; border-radius: 2px;
    background: rgba(255,255,255,0.1); outline: none; margin: 0;
  }
  .custom-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 10px; height: 10px;
    border-radius: 50%; background: var(--text-main); cursor: pointer;
  }

  /* Dock Inferior Ultra Minimalista */
  .master-dock {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px;
    background: rgba(5, 7, 13, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255, 255, 255, 0.05); padding: 15px 20px 25px; z-index: 100;
    display: flex; flex-direction: column; gap: 15px; border-radius: 24px 24px 0 0;
  }

  .dock-row { display: flex; align-items: center; justify-content: space-between; gap: 15px; }

  .btn-stop {
    width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  .master-vol-wrapper { flex: 1; display: flex; align-items: center; gap: 12px; }
  .master-icon { font-size: 1rem; opacity: 0.5; }

  .timer-group { display: flex; gap: 8px; justify-content: center; }
  .btn-time {
    padding: 8px 12px; border-radius: 10px; border: 1px solid transparent;
    background: transparent; color: var(--text-muted); font-size: 0.7rem; cursor: pointer;
  }
  .btn-time.is-active { background: rgba(255,255,255,0.05); color: var(--text-main); border-color: rgba(255,255,255,0.1); }
  
  .time-display { font-size: 0.7rem; color: var(--primary); text-align: center; letter-spacing: 0.2em; min-height: 12px;}

</style>
</head>
<body>

<div class="ambient-bg" aria-hidden="true"></div>
<audio id="silentAudio" loop style="display:none"></audio>

<main class="app-container">
  <header>
    <h1><em>Sere</em>nidad</h1>
    <p>Colección de sonidos ambientales</p>
  </header>
  
  <!-- Combinaciones / Presets -->
  <nav class="presets-container" id="presetsBar">
    <button class="preset-btn" onclick="playPreset('bosque')">🌲 Lluvia en el Bosque</button>
    <button class="preset-btn" onclick="playPreset('cabana')">🔥 Noche de Cabaña</button>
    <button class="preset-btn" onclick="playPreset('tibet')">🎐 Paz Tibetana</button>
    <button class="preset-btn" onclick="playPreset('rio')">💧 Río Sereno</button>
  </nav>

  <section class="sound-grid" id="mainGrid"></section>
</main>

<div class="master-dock">
  <div class="dock-row">
    <button class="btn-stop" id="stopAll" title="Pausar">⏹</button>
    <section class="master-vol-wrapper">
      <span class="master-icon">🔊</span>
      <input type="range" class="custom-slider" id="masterVol" min="0" max="1" step="0.01" value="0.8">
    </section>
  </div>
  
  <div class="dock-row" style="flex-direction: column; gap: 5px;">
    <nav class="timer-group">
      <button class="btn-time" data-mins="15">15M</button>
      <button class="btn-time" data-mins="30">30M</button>
      <button class="btn-time" data-mins="60">1H</button>
      <button class="btn-time" data-mins="0">∞</button>
    </nav>
    <div class="time-display" id="timerDisplay"></div>
  </div>
</div>

<script>
// --- BIBLIOTECA DE 28 SONIDOS BBC ---
const library = [
  { id: 's1', icon: '🌬️', color: '#7ec8c8', url: 'bbc_atmosphere_07052031.mp3' },
  { id: 's2', icon: '🌌', color: '#a78bfa', url: 'bbc_atmosphere_07052090.mp3' },
  { id: 's3', icon: '🌧️', color: '#60a5fa', url: 'bbc_atmosphere_07056023.mp3' },
  { id: 's4', icon: '🍃', color: '#86efac', url: 'bbc_atmosphere_07056037.mp3' },
  { id: 's5', icon: '🌃', color: '#38bdf8', url: 'bbc_atmosphere_07056038.mp3' },
  { id: 's6', icon: '🌫️', color: '#94a3b8', url: 'bbc_atmosphere_07058196.mp3' },
  { id: 's7', icon: '🌑', color: '#64748b', url: 'bbc_atmosphere_07060032.mp3' },
  { id: 's8', icon: '🌲', color: '#10b981', url: 'bbc_atmosphere_07062086.mp3' },
  { id: 's9', icon: '🦗', color: '#f472b6', url: 'bbc_atmosphere_07062126.mp3' },
  { id: 's10', icon: '🚞', color: '#818cf8', url: 'bbc_atmosphere_07063065.mp3' },
  { id: 's11', icon: '🎐', color: '#cbd5e1', url: 'bbc_atmosphere_07063086.mp3' },
  { id: 's12', icon: '🔥', color: '#fb923c', url: 'bbc_bonfire---_07024184.mp3' },
  { id: 's13', icon: '🪵', color: '#ea580c', url: 'bbc_bonfires--_07019120.mp3' },
  { id: 's14', icon: '♨️', color: '#f97316', url: 'bbc_bonfires--_07019121.mp3' },
  { id: 's15', icon: '⛪', color: '#fbbf50', url: 'bbc_church-atm_07006138.mp3' },
  { id: 's16', icon: '🌇', color: '#f43f5e', url: 'bbc_exterior-a_07044002.mp3' },
  { id: 's17', icon: '🚿', color: '#0ea5e9', url: 'bbc_fast-flowi_nhu0510424.mp3' },
  { id: 's18', icon: '🔥', color: '#f87171', url: 'bbc_fires---fi_07025145.mp3' },
  { id: 's19', icon: '🎇', color: '#fbbf50', url: 'bbc_fires--bon_07025149.mp3' },
  { id: 's20', icon: '🏠', color: '#3b82f6', url: 'bbc_fires--hou_07059050.mp3' },
  { id: 's21', icon: '⛵', color: '#38bdf8', url: 'bbc_lakeside--_nhu0503300.mp3' },
  { id: 's22', icon: '⛲', color: '#a5f3fc', url: 'bbc_lakeside-a_nhu0507206.mp3' },
  { id: 's23', icon: '🌿', color: '#16a34a', url: 'bbc_mixed---wo_07044053.mp3' },
  { id: 's24', icon: '🌄', color: '#fb923c', url: 'bbc_moorland--_nhu0510424.mp3' },
  { id: 's25', icon: '🦋', color: '#f472b6', url: 'bbc_natural-at_07044122.mp3' },
  { id: 's26', icon: '🏞️', color: '#0ea5e9', url: 'bbc_rivers---b_07070201.mp3' },
  { id: 's27', icon: '🔔', color: '#fcd34d', url: 'bbc_st--pauls-_07002178.mp3' },
  { id: 's28', icon: '❄️', color: '#ffffff', url: 'bbc_tibetan-sn_nhu0501102.mp3' }
];

// --- COMBINACIONES (PRESETS) ---
const presets = {
  'bosque': [{id: 's8', vol: 0.8}, {id: 's3', vol: 0.5}, {id: 's23', vol: 0.4}], // Bosque, Lluvia, Mixto
  'cabana': [{id: 's12', vol: 0.9}, {id: 's9', vol: 0.4}, {id: 's5', vol: 0.3}], // Hoguera, Grillos, Noche
  'tibet':  [{id: 's28', vol: 0.8}, {id: 's15', vol: 0.5}, {id: 's1', vol: 0.6}], // Nieve tibetana, Iglesia, Viento
  'rio':    [{id: 's17', vol: 0.7}, {id: 's26', vol: 0.6}, {id: 's21', vol: 0.3}]  // Flujo rápido, Ríos, Lago
};

// --- Motor de Audio Orgánico ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let AC = null; let masterGain = null;
const audioBuffers = {}; const state = {}; const localVolumes = {}; 
let masterVolume = 0.8;

function initAudio() {
  if (!AC) { 
    AC = new AudioContext(); masterGain = AC.createGain(); masterGain.gain.value = masterVolume; masterGain.connect(AC.destination); 
    document.getElementById('silentAudio').play().catch(()=>{});
  }
  if (AC.state === 'suspended') AC.resume();
}

function organicPulseLoop() {
  const now = AC ? AC.currentTime : 0;
  Object.keys(state).forEach(id => {
    const s = state[id];
    const pulse = (Math.sin(now * s.modFreq1 + s.modOffset) * 0.5 + Math.sin(now * s.modFreq2) * 0.5);
    const organicGain = 1 + (pulse * 0.15); // Fluctuación sutil
    s.gain.gain.setTargetAtTime(localVolumes[id] * organicGain, now, 0.2);
  });
  requestAnimationFrame(organicPulseLoop);
}

// --- Render Cuadrícula ---
const mainGrid = document.getElementById('mainGrid');
library.forEach(s => {
  localVolumes[s.id] = 0.7; 
  const card = document.createElement('div');
  card.className = 'card'; card.id = `card-${s.id}`;
  card.style.setProperty('--card-color', s.color);
  
  card.innerHTML = `
    <div class="icon-wrap">${s.icon}</div>
    <div class="vol-control">
      <input type="range" class="custom-slider card-vol" id="slider-${s.id}" min="0" max="1" step="0.01" value="0.7">
    </div>`;

  card.addEventListener('click', (e) => { 
    if (e.target.classList.contains('card-vol')) return; 
    clearPresetsUI();
    initAudio(); toggleSound(s.id); 
  });

  const slider = card.querySelector('.card-vol');
  slider.addEventListener('input', (e) => { 
    clearPresetsUI();
    localVolumes[s.id] = parseFloat(e.target.value); 
    updateSliderUI(slider, s.color);
  });
  updateSliderUI(slider, s.color);
  mainGrid.appendChild(card);
});

function updateSliderUI(slider, color) {
  const valPercent = (slider.value - slider.min) / (slider.max - slider.min) * 100;
  slider.style.background = `linear-gradient(to right, ${color} ${valPercent}%, rgba(255,255,255,0.1) ${valPercent}%)`;
}

// --- Lógica de Reproducción ---
function toggleSound(id) { if (state[id]) stopSound(id); else startSound(id); }

async function startSound(id) {
  if (state[id]) return; const card = document.getElementById(`card-${id}`); const sd = library.find(s => s.id === id);
  try {
    if (!audioBuffers[id]) {
      const res = await fetch(sd.url); const ab = await res.arrayBuffer(); 
      audioBuffers[id] = await AC.decodeAudioData(ab);
    }
    card.classList.add('is-active');
    const lg = AC.createGain(); lg.gain.value = localVolumes[id]; lg.connect(masterGain);
    const s = AC.createBufferSource(); s.buffer = audioBuffers[id]; s.loop = true; s.connect(lg); s.start();
    
    state[id] = { sourceObj: s, gain: lg, modOffset: Math.random() * 20, modFreq1: 0.1 + Math.random()*0.2, modFreq2: 0.3 + Math.random()*0.4 };
  } catch (e) { console.error("Error:", e); }
}

function stopSound(id) {
  if (!state[id]) return; const { sourceObj, gain } = state[id]; 
  gain.gain.setTargetAtTime(0, AC.currentTime, 0.3); 
  setTimeout(() => { try { sourceObj.stop(); sourceObj.disconnect(); gain.disconnect(); } catch(e){} }, 500); 
  delete state[id];
  document.getElementById(`card-${id}`).classList.remove('is-active');
}

function stopAll() { 
  Object.keys(state).forEach(stopSound); 
  clearPresetsUI();
}

// --- Control de Combinaciones (Presets) ---
function clearPresetsUI() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active-preset'));
}

async function playPreset(presetName) {
  initAudio();
  stopAll(); // Limpia la mesa
  
  // Resalta el botón
  event.currentTarget.classList.add('active-preset');

  // Carga los sonidos de la combinación
  const mix = presets[presetName];
  for (const item of mix) {
    localVolumes[item.id] = item.vol;
    const slider = document.getElementById(`slider-${item.id}`);
    if (slider) {
      slider.value = item.vol;
      const sd = library.find(s => s.id === item.id);
      updateSliderUI(slider, sd.color);
    }
    await startSound(item.id);
  }
}

// --- Dock Controls ---
const mSlider = document.getElementById('masterVol');
mSlider.addEventListener('input', (e) => {
  initAudio(); masterVolume = parseFloat(e.target.value);
  const valPercent = (masterVolume - mSlider.min) / (mSlider.max - mSlider.min) * 100;
  mSlider.style.background = `linear-gradient(to right, var(--primary) ${valPercent}%, rgba(255,255,255,0.1) ${valPercent}%)`;
  if(masterGain) masterGain.gain.setTargetAtTime(masterVolume, AC.currentTime, 0.1);
});
mSlider.style.background = `linear-gradient(to right, var(--primary) 80%, rgba(255,255,255,0.1) 80%)`;

let ti = null;
document.querySelectorAll('.btn-time').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn-time').forEach(b => b.classList.remove('is-active')); btn.classList.add('is-active');
    const mins = parseInt(btn.dataset.mins); clearInterval(ti);
    if (mins === 0) { document.getElementById('timerDisplay').textContent = ''; return; }
    
    const end = Date.now() + mins * 60000;
    ti = setInterval(() => {
      const rem = end - Date.now();
      if (rem <= 0) { clearInterval(ti); stopAll(); document.getElementById('timerDisplay').textContent = ''; return; }
      const m = Math.floor(rem / 60000); const s = Math.floor((rem % 60000) / 1000);
      document.getElementById('timerDisplay').textContent = `⏱ ${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);
  });
});

document.getElementById('stopAll').addEventListener('click', stopAll);
organicPulseLoop();
</script>
</body>
</html>
