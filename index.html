<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05070d">
<title>Serenidad Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --glass:rgba(8,12,22,.55);
  --border:rgba(255,255,255,.07);
  --text:#f0f4ff;
  --muted:#3d5070;
  --primary:#7ecfcf;
  --purple:#a78bfa;
}
html,body{height:100%;overflow:hidden;background:#04060e;color:var(--text);font-family:'Outfit',sans-serif}

/* ── CANVAS — fijo, nunca se mueve ── */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;width:100vw;height:100vh;display:block}

/* ── VIGNETTE ── */
.vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 90% 55% at 50% 100%,rgba(0,0,0,.6) 0%,transparent 70%),
             radial-gradient(ellipse 60% 35% at 50% 0%,rgba(0,0,0,.3) 0%,transparent 60%)}

/* ── TOAST ── */
#easterToast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:200;
  background:rgba(8,12,22,.85);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(20px);
  border-radius:999px;padding:7px 18px;font-size:.62rem;letter-spacing:.18em;color:var(--text);
  white-space:nowrap;transition:transform .5s cubic-bezier(.34,1.56,.64,1),opacity .5s;pointer-events:none;opacity:0}
#easterToast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── SCENE OVERLAY ── */
#sceneTransOverlay{position:fixed;inset:0;z-index:5;pointer-events:none;
  background:rgba(0,0,0,0);transition:background 1.2s ease}
#sceneTransOverlay.fade{background:rgba(0,0,0,.55)}

/* ════════════════════════════════════
   APP — contenedor full height sin scroll en body
   ════════════════════════════════════ */
.app{
  position:relative;z-index:10;
  height:100vh;display:flex;flex-direction:column;
  max-width:600px;margin:0 auto;overflow:hidden;
}

/* ── HEADER ── */
header{flex-shrink:0;padding:46px 22px 8px;text-align:center}
header h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:2.35rem;
  letter-spacing:.1em;text-shadow:0 2px 28px rgba(0,0,0,.7)}
header h1 em{font-style:italic;color:var(--primary)}
#timeGreeting{font-size:.68rem;font-weight:300;letter-spacing:.16em;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:6px;opacity:.6;margin-top:3px}

/* ── ZONA SCROLLABLE INTERIOR ── */
.scroll-zone{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.scroll-zone::-webkit-scrollbar{display:none}

/* Labels de sección */
.sec-lbl{
  font-size:.54rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.22em;padding:10px 22px 5px;display:block;
}

/* ─────────────────────────────────────
   PAISAJES SONOROS — scroll horizontal
   ───────────────────────────────────── */
.landscapes-row{
  display:flex;gap:9px;overflow-x:auto;overflow-y:hidden;
  padding:0 22px 4px;scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.landscapes-row::-webkit-scrollbar{display:none}

.pre-btn{
  flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:9px 13px 8px;border-radius:16px;border:1px solid var(--border);
  background:var(--glass);color:var(--text);font-family:'Outfit',sans-serif;
  font-size:.6rem;font-weight:300;cursor:pointer;transition:all .25s;
  backdrop-filter:blur(14px);min-width:68px;
}
.pre-btn .pre-icon{font-size:1.2rem;line-height:1}
.pre-btn .pre-name{font-size:.55rem;color:rgba(240,244,255,.65);text-align:center;line-height:1.2}
.pre-btn.act{
  background:rgba(126,207,207,.12);border-color:var(--primary);
  box-shadow:0 0 14px rgba(126,207,207,.14);
}
.pre-btn.act .pre-name{color:var(--primary)}

/* ─────────────────────────────────────
   BINAURAL PILLS — flotantes, compactas
   ───────────────────────────────────── */
.bw-float-row{
  display:flex;gap:5px;overflow-x:auto;overflow-y:hidden;
  padding:5px 22px 3px;scrollbar-width:none;-webkit-overflow-scrolling:touch;
  align-items:center;
}
.bw-float-row::-webkit-scrollbar{display:none}

.bw-pill{
  flex:0 0 auto;display:flex;align-items:center;gap:4px;
  padding:4px 9px 4px 7px;border-radius:999px;
  border:1px solid rgba(167,139,250,.18);
  background:rgba(10,8,22,.48);backdrop-filter:blur(12px);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.bw-pill .pdot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(167,139,250,.35);transition:all .2s;flex-shrink:0;
}
.bw-pill .phz{font-size:.56rem;color:rgba(167,139,250,.7);letter-spacing:.05em;font-weight:400}
.bw-pill .pname{font-size:.5rem;color:rgba(180,170,220,.42);letter-spacing:.03em}
.bw-pill.act{
  background:rgba(167,139,250,.14);border-color:var(--purple);
  box-shadow:0 0 8px rgba(167,139,250,.18);
}
.bw-pill.act .pdot{background:var(--purple);box-shadow:0 0 5px var(--purple)}
.bw-pill.act .phz{color:var(--purple)}
.bw-pill.act .pname{color:rgba(200,190,255,.65)}

/* Barra de intensidad binaural */
.bw-intensity{display:none;align-items:center;gap:8px;padding:3px 22px 2px;animation:fdIn .3s ease}
.bw-intensity.vis{display:flex}
@keyframes fdIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.bw-int-lbl{font-size:.5rem;color:var(--purple);letter-spacing:.12em;flex-shrink:0}
.bw-int-val{font-size:.5rem;color:var(--purple);flex-shrink:0;min-width:24px;text-align:right}
.bw-safe-bar{display:none;align-items:center;gap:6px;padding:1px 22px 5px}
.bw-safe-bar.vis{display:flex}
.bw-safe-track{flex:1;height:2px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden}
.bw-safe-fill{height:100%;border-radius:2px;background:linear-gradient(to right,#4ade80,#fbbf24,#f87171);transition:width .2s}
.bw-safe-lbl{font-size:.46rem;color:var(--muted);letter-spacing:.08em;flex-shrink:0}

/* ─────────────────────────────────────
   SONIDOS — grid en 4 filas, scroll horizontal
   ───────────────────────────────────── */
.sounds-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 22px 4px;
}
.active-count{font-size:.5rem;color:var(--primary);letter-spacing:.1em;opacity:.8}

.sound-scroll{
  overflow-x:auto;overflow-y:hidden;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;padding:4px 22px 12px;
}
.sound-scroll::-webkit-scrollbar{display:none}

.sound-grid-h{
  display:grid;
  grid-template-rows:repeat(4,66px);
  grid-auto-flow:column;
  grid-auto-columns:66px;
  gap:8px;width:max-content;
}

.card{
  background:var(--glass);border:1px solid var(--border);border-radius:15px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all .28s;user-select:none;position:relative;overflow:hidden;
  width:66px;height:66px;backdrop-filter:blur(10px);
}
.card.on{
  border-color:var(--card-color);background:rgba(4,7,16,.9);
  box-shadow:0 0 16px rgba(0,0,0,.4);
}
.card-icon{font-size:1.5rem;line-height:1;transition:all .28s;z-index:2}
.card.on .card-icon{filter:drop-shadow(0 0 7px var(--card-color));transform:scale(1.1)}
.card-vol-wrap{
  position:absolute;bottom:5px;width:82%;
  opacity:0;transform:translateY(4px);transition:all .28s;pointer-events:none;
}
.card.on .card-vol-wrap{opacity:1;transform:none;pointer-events:auto}
.cslider{-webkit-appearance:none;width:100%;height:2px;border-radius:2px;background:rgba(255,255,255,.1);outline:none}
.cslider::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:8px;border-radius:50%;background:var(--text);cursor:pointer}

/* ════════════════════════════════════
   DOCK — pegado al fondo de .app
   ════════════════════════════════════ */
.dock{
  flex-shrink:0;z-index:100;
  background:rgba(3,5,12,.94);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-top:1px solid rgba(255,255,255,.055);
  padding:9px 20px calc(12px + env(safe-area-inset-bottom,0px));
  display:flex;flex-direction:column;gap:8px;
  border-radius:20px 20px 0 0;
}
.scene-pill{
  display:flex;align-items:center;gap:7px;padding:5px 11px;
  background:rgba(255,255,255,.032);border:1px solid rgba(255,255,255,.055);
  border-radius:999px;flex:1;min-width:0;overflow:hidden;
}
.scene-pill .spi{font-size:.8rem;flex-shrink:0}
.scene-pill .spn{
  font-family:'Cormorant Garamond',serif;font-size:.7rem;font-weight:300;
  color:var(--text);letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1
}
.scene-pill .spb{font-size:.48rem;color:var(--muted);letter-spacing:.1em;flex-shrink:0;white-space:nowrap}

.dock-row{display:flex;align-items:center;gap:9px}
.btn-stop{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:rgba(255,60,60,.07);border:1px solid rgba(255,80,80,.18);
  color:rgba(255,110,110,.7);font-size:.85rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .16s;
}
.btn-stop:active{background:rgba(255,60,60,.2);transform:scale(.9)}
.vol-wrap{flex:1;display:flex;align-items:center;gap:9px}
.vol-icon{font-size:.82rem;opacity:.35}
.mslider{-webkit-appearance:none;flex:1;height:3px;border-radius:3px;outline:none}
.mslider::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--text);cursor:pointer}
.timer-row{display:flex;gap:5px;justify-content:center}
.tbtn{padding:5px 9px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:.62rem;cursor:pointer;transition:all .16s}
.tbtn.on{background:rgba(255,255,255,.05);color:var(--text);border-color:rgba(255,255,255,.1)}
.tdisplay{font-size:.62rem;color:var(--primary);text-align:center;letter-spacing:.18em;min-height:11px}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="vignette"></div>
<div id="sceneTransOverlay"></div>
<div id="easterToast"></div>

<div class="app">

  <header>
    <h1><em>Sere</em>nidad</h1>
    <p id="timeGreeting"><span>✨</span> Sincronizando...</p>
  </header>

  <div class="scroll-zone">

    <!-- Paisajes sonoros -->
    <span class="sec-lbl">Paisajes Sonoros</span>
    <nav class="landscapes-row" id="presetsRow">
      <button class="pre-btn" data-preset="local">
        <span class="pre-icon">📍</span><span class="pre-name">Tu Momento</span>
      </button>
      <button class="pre-btn" data-preset="bosque">
        <span class="pre-icon">🌲</span><span class="pre-name">Bosque Profundo</span>
      </button>
      <button class="pre-btn" data-preset="cabana">
        <span class="pre-icon">🔥</span><span class="pre-name">Noche de Cabaña</span>
      </button>
      <button class="pre-btn" data-preset="tibet">
        <span class="pre-icon">🎐</span><span class="pre-name">Paz Tibetana</span>
      </button>
      <button class="pre-btn" data-preset="rio">
        <span class="pre-icon">💧</span><span class="pre-name">Río Sereno</span>
      </button>
    </nav>

    <!-- Binaural pills — justo debajo de paisajes -->
    <div class="bw-float-row" id="bwPillsRow"></div>
    <div class="bw-intensity" id="bwVol">
      <span class="bw-int-lbl">BINAURAL</span>
      <input type="range" class="cslider" id="bwSlider" min="0" max="0.25" step="0.005" value="0.08" style="flex:1">
      <span class="bw-int-val" id="bwVolVal">8%</span>
    </div>
    <div class="bw-safe-bar" id="bwSafeBar">
      <span class="bw-safe-lbl">NIVEL</span>
      <div class="bw-safe-track"><div class="bw-safe-fill" id="bwSafeFill" style="width:32%"></div></div>
      <span class="bw-safe-lbl" id="bwSafeLbl">SEGURO</span>
    </div>

    <!-- Sonidos en grid horizontal -->
    <div class="sounds-header">
      <span class="sec-lbl" style="padding:0">Sonidos</span>
      <span class="active-count" id="activeCount"></span>
    </div>
    <div class="sound-scroll">
      <div class="sound-grid-h" id="mainGrid"></div>
    </div>

  </div><!-- /scroll-zone -->

  <!-- Dock fijo al fondo -->
  <div class="dock">
    <div class="dock-row">
      <div class="scene-pill">
        <span class="spi" id="pillIcon">🌙</span>
        <span class="spn" id="pillName">Cargando...</span>
        <span class="spb" id="pillBadge"></span>
      </div>
      <button class="btn-stop" id="btnStop">⏹</button>
    </div>
    <div class="dock-row">
      <div class="vol-wrap">
        <span class="vol-icon">🔈</span>
        <input type="range" class="mslider" id="masterVol" min="0" max="1" step="0.01" value="0.8">
        <span class="vol-icon">🔊</span>
      </div>
    </div>
    <div class="dock-row" style="flex-direction:column;gap:3px">
      <nav class="timer-row">
        <button class="tbtn" data-m="15">15M</button>
        <button class="tbtn" data-m="30">30M</button>
        <button class="tbtn" data-m="60">1H</button>
        <button class="tbtn" data-m="0">∞</button>
      </nav>
      <div class="tdisplay" id="tdisplay"></div>
    </div>
  </div>

</div>

<script>
'use strict';
const $=id=>document.getElementById(id);
const haptic=()=>{try{navigator.vibrate&&navigator.vibrate(20)}catch(e){}};

   MOTOR DE FONDO — canvas position:fixed
   Animación independiente del scroll.
   ══════════════════════════════════════ */

    mediodia_jueves:    {sky:['#081628','#162848','#2e5898'],sun:.95,name:'Claridad Pura',badge:'☀️ 12–15h'},

    atardecer_miercoles:{sky:['#3a1830','#6a2840','#b04060'],sun:.4,mist:.3,name:'Atardecer Púrpura',badge:'🌆 18–20h'},

    noche_martes:       {sky:['#03050c','#070c18','#0b1424'],stars:.9,moon:.5,fireflies:.5,name:'Luciérnagas de Martes',badge:'🌙 20–23h'},
    noche_miercoles:    {sky:['#040608','#08101a','#0c1828'],stars:.7,moon:.4,rain:.4,name:'Lluvia Nocturna',badge:'🌙 20–23h'},
    noche_jueves:       {sky:['#03050e','#07091a','#0b1128'],stars:.85,moon:.8,name:'Luna de Jueves',badge:'🌙 20–23h'},
    noche_viernes:      {sky:['#05060e','#090c1c','#0e1428'],stars:.9,moon:.5,aurora:.4,name:'Aurora de Viernes',badge:'🌙 20–23h'},
    noche_sabado:       {sky:['#04060c','#080c18','#0c1224'],stars:1,moon:.7,name:'Noche Estrellada',badge:'🌙 20–23h'},

    medianoche_martes:  {sky:['#02030a','#05070f','#080b18'],stars:1,moon:.6,aurora:.7,name:'Aurora Boreal II',badge:'✨ 23–1h'},
    medianoche_miercoles:{sky:['#030408','#06080f','#090c18'],stars:.85,moon:.5,rain:.2,name:'Lluvia de Meteoros',badge:'✨ 23–1h'},
    medianoche_jueves:  {sky:['#02030a','#04060e','#070918'],stars:.9,moon:1,name:'Luna Llena de Jueves',badge:'✨ 23–1h'},

    medianoche_sabado:  {sky:['#030408','#060910','#0a0e1c'],stars:1,moon:.9,aurora:.5,name:'Cielo Infinito',badge:'✨ 23–1h'},
    medianoche_domingo: {sky:['#020408','#05080f','#080c18'],stars:.9,moon:.8,fog:.4,name:'Víspera del Lunes',badge:'✨ 23–1h'},
  };
  const MOMENTS=['madrugada','amanecer','manana','mediodia','tarde','atardecer','noche','medianoche'];
  const DAYS=['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
  function hourToMoment(h){
    if(h<5)return 0;if(h<7)return 1;if(h<12)return 2;
    if(h<15)return 3;if(h<18)return 4;if(h<20)return 5;
    if(h<23)return 6;return 7;
  }
  function getScene(d,m){
    const key=`${MOMENTS[m]}_${DAYS[d]}`;
    return{...(PALETTES[key]||PALETTES['noche_lunes']),day:d,moment:m,key};
  }

  /* Partículas */
  class Particle{
    constructor(t,s){this.type=t;this.reset(s);this.y=Math.random()*H}
    reset(s){
      switch(this.type){
        case'star':
          this.x=Math.random()*W;this.y=Math.random()*H*.7;
          this.r=Math.random()*1.5+.3;this.alpha=0;
          this.maxAlpha=Math.random()*.85+.15;this.twinkleSpeed=Math.random()*.025+.005;
          this.twinklePhase=Math.random()*Math.PI*2;break;
        case'firefly':
          this.x=Math.random()*W;this.y=Math.random()*H*.8+H*.1;
          this.vx=(Math.random()-.5)*.4;this.vy=(Math.random()-.5)*.3;
          this.alpha=0;this.maxAlpha=Math.random()*.7+.3;
          this.glowPhase=Math.random()*Math.PI*2;this.glowSpeed=Math.random()*.04+.02;
          this.hue=Math.random()*40+80;break;
        case'rain':
          this.x=Math.random()*W;this.y=-20;
          this.vy=Math.random()*8+6;this.vx=-1.5;
          this.len=Math.random()*15+8;this.alpha=Math.random()*.35+.1;break;
        case'snow':
          this.x=Math.random()*W;this.y=Math.random()*-H;
          this.r=Math.random()*3+1;this.vy=Math.random()*1.5+.5;
          this.vx=(Math.random()-.5)*.8;this.alpha=Math.random()*.7+.2;
          this.sway=Math.random()*.02;this.swayPhase=Math.random()*Math.PI*2;break;
        case'bird':
          this.x=-60;this.y=Math.random()*H*.45+H*.04;
          this.vx=Math.random()*2+1.5;
          this.flapPhase=Math.random()*Math.PI*2;this.flapSpeed=Math.random()*.15+.1;
          this.size=Math.random()*4+3;this.alpha=Math.random()*.7+.3;break;
        case'cloud':
          this.x=-220;this.y=Math.random()*H*.38;
          this.vx=Math.random()*.28+.08;this.w=Math.random()*160+80;this.h=Math.random()*50+24;
          this.alpha=Math.random()*.18+.04;break;
        case'fog':
          this.x=Math.random()*W*2-W*.5;this.y=Math.random()*H;
          this.r=Math.random()*200+120;this.alpha=0;this.maxAlpha=Math.random()*.07+.02;
          this.vx=(Math.random()-.5)*.18;this.vy=(Math.random()-.5)*.06;
          this.growPhase=Math.random()*Math.PI*2;this.growSpeed=Math.random()*.005+.002;break;
        case'mist':
          this.x=Math.random()*W;this.y=H*.5+Math.random()*H*.4;
          this.r=Math.random()*300+150;this.alpha=0;this.maxAlpha=Math.random()*.09+.03;
          this.vx=(Math.random()-.5)*.12;this.growPhase=Math.random()*Math.PI*2;this.growSpeed=.003;break;
        case'aurora':
          this.y=Math.random()*H*.38;this.phase=Math.random()*Math.PI*2;
          this.speed=Math.random()*.005+.002;this.amplitude=Math.random()*60+30;
          this.hue=Math.random()*60+155;this.alpha=0;this.maxAlpha=Math.random()*.14+.05;
          this.width=Math.random()*W*.7+W*.2;this.x=Math.random()*W*.4;break;
      }
    }
    update(t,s){
      switch(this.type){
        case'star':this.twinklePhase+=this.twinkleSpeed;this.alpha=this.maxAlpha*(.5+.5*Math.sin(this.twinklePhase));break;
        case'firefly':
          this.glowPhase+=this.glowSpeed;this.x+=this.vx;this.y+=this.vy;
          this.alpha=this.maxAlpha*(.5+.5*Math.sin(this.glowPhase));
          this.vx+=(Math.random()-.5)*.06;this.vy+=(Math.random()-.5)*.04;
          this.vx=Math.max(-1,Math.min(1,this.vx));this.vy=Math.max(-.5,Math.min(.5,this.vy));
          if(this.x<-10||this.x>W+10||this.y<0||this.y>H)this.reset(s);break;
        case'rain':this.x+=this.vx;this.y+=this.vy;if(this.y>H+20){this.y=-20;this.x=Math.random()*W}break;
        case'snow':this.swayPhase+=this.sway;this.x+=this.vx+Math.sin(this.swayPhase)*.5;this.y+=this.vy;if(this.y>H+10){this.y=Math.random()*-50;this.x=Math.random()*W}break;
        case'bird':this.flapPhase+=this.flapSpeed;this.x+=this.vx;this.y+=Math.sin(this.flapPhase*.8)*.4;if(this.x>W+80)this.reset(s);break;
        case'cloud':this.x+=this.vx;if(this.x>W+250)this.reset(s);break;
        case'fog':this.growPhase+=this.growSpeed;this.x+=this.vx;this.y+=this.vy;this.alpha=this.maxAlpha*(.5+.5*Math.sin(this.growPhase));if(this.x<-this.r*2)this.x=W+this.r;if(this.x>W+this.r*2)this.x=-this.r;break;
        case'mist':this.growPhase+=this.growSpeed;this.x+=this.vx;this.alpha=this.maxAlpha*(.5+.5*Math.sin(this.growPhase));if(this.x<-this.r*2)this.x=W+this.r;if(this.x>W+this.r*2)this.x=-this.r;break;
        case'aurora':this.phase+=this.speed;this.alpha=this.maxAlpha*(.5+.5*Math.sin(this.phase));break;
      }
    }
    draw(){
      ctx.save();
      switch(this.type){
        case'star':{
          ctx.globalAlpha=this.alpha;
          const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*3);
          g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(.3,'rgba(255,255,255,.8)');g.addColorStop(1,'transparent');
          ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,this.r*3,0,Math.PI*2);ctx.fill();break;
        }
        case'firefly':{
          ctx.globalAlpha=this.alpha;
          const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,10);
          g.addColorStop(0,`hsla(${this.hue},100%,85%,1)`);g.addColorStop(1,`hsla(${this.hue},100%,60%,0)`);
          ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,10,0,Math.PI*2);ctx.fill();break;
        }
        case'rain':{
          ctx.globalAlpha=this.alpha;ctx.strokeStyle='rgba(180,210,255,.5)';ctx.lineWidth=.8;
          ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(this.x+this.vx*this.len/this.vy,this.y+this.len);ctx.stroke();break;
        }
        case'snow':{
          ctx.globalAlpha=this.alpha;
          const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2.5);
          g.addColorStop(0,'rgba(255,255,255,.95)');g.addColorStop(1,'rgba(220,235,255,0)');
          ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,this.r*2.5,0,Math.PI*2);ctx.fill();break;
        }
        case'bird':{
          ctx.globalAlpha=this.alpha;
          const flap=Math.sin(this.flapPhase)*this.size;
          ctx.strokeStyle='rgba(20,30,50,.7)';ctx.lineWidth=1.2;
          ctx.beginPath();ctx.moveTo(this.x,this.y);
          ctx.quadraticCurveTo(this.x-this.size,this.y-flap,this.x-this.size*2,this.y);
          ctx.moveTo(this.x,this.y);
          ctx.quadraticCurveTo(this.x+this.size,this.y-flap,this.x+this.size*2,this.y);
          ctx.stroke();break;
        }
        case'cloud':{
          ctx.globalAlpha=this.alpha;ctx.fillStyle='rgba(210,225,255,1)';
          const x=this.x+this.w/2,y=this.y,w=this.w,h=this.h;
          ctx.beginPath();ctx.ellipse(x,y,w*.5,h*.5,0,0,Math.PI*2);ctx.fill();
          ctx.beginPath();ctx.ellipse(x-w*.22,y+h*.18,w*.38,h*.42,0,0,Math.PI*2);ctx.fill();
          ctx.beginPath();ctx.ellipse(x+w*.22,y+h*.18,w*.38,h*.42,0,0,Math.PI*2);ctx.fill();break;
        }
        case'fog':case'mist':{
          ctx.globalAlpha=this.alpha;
          const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
          g.addColorStop(0,'rgba(200,215,238,.9)');g.addColorStop(1,'transparent');
          ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();break;
        }
        case'aurora':{
          ctx.globalAlpha=this.alpha;
          const g=ctx.createLinearGradient(this.x,this.y-this.amplitude,this.x,this.y+this.amplitude*2.5);
          g.addColorStop(0,'transparent');g.addColorStop(.35,`hsla(${this.hue},70%,62%,.65)`);
          g.addColorStop(.65,`hsla(${this.hue+35},80%,56%,.4)`);g.addColorStop(1,'transparent');
          ctx.beginPath();
          for(let i=0;i<=24;i++){
            const px=this.x+i/24*this.width,py=this.y+Math.sin(this.phase+i/24*Math.PI*3)*this.amplitude;
            i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
          }
          ctx.lineTo(this.x+this.width,this.y+this.amplitude*2.5);
          ctx.lineTo(this.x,this.y+this.amplitude*2.5);
          ctx.closePath();ctx.fillStyle=g;ctx.fill();break;
        }
      }
      ctx.restore();
    }
  }

  function buildParticles(scene){
    particles=[];const p=scene;
    for(let i=0;i<Math.floor((p.stars||0)*120);i++)particles.push(new Particle('star',p));
    for(let i=0;i<Math.floor((p.fireflies||0)*38);i++)particles.push(new Particle('firefly',p));
    for(let i=0;i<Math.floor((p.rain||0)*200);i++)particles.push(new Particle('rain',p));
    for(let i=0;i<Math.floor((p.snow||0)*90);i++)particles.push(new Particle('snow',p));
    for(let i=0;i<Math.floor((p.birds||0)*14);i++){const b=new Particle('bird',p);b.x=Math.random()*W;particles.push(b)}
    for(let i=0;i<Math.floor((p.clouds||0)*10);i++){const c=new Particle('cloud',p);c.x=Math.random()*W;particles.push(c)}
    for(let i=0;i<Math.floor((p.fog||0)*14);i++)particles.push(new Particle('fog',p));
    for(let i=0;i<Math.floor((p.mist||0)*10);i++)particles.push(new Particle('mist',p));
    for(let i=0;i<Math.floor((p.aurora||0)*8);i++)particles.push(new Particle('aurora',p));
  }

  function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
  function lerpColor(a,b,t){
    const ca=hexRgb(a),cb=hexRgb(b);
    return`rgb(${Math.round(ca[0]+(cb[0]-ca[0])*t)},${Math.round(ca[1]+(cb[1]-ca[1])*t)},${Math.round(ca[2]+(cb[2]-ca[2])*t)})`;
  }

  function drawSky(scene){
    const sky=scene.sky||['#04060e','#08101c','#0c1828'],m=scene.moment;
    const s0=sky[0],s1=sky[Math.floor(sky.length/2)],s2=sky[sky.length-1];
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,s0);g.addColorStop(.25,lerpColor(s0,s1,.5));
    g.addColorStop(.5,s1);g.addColorStop(.75,lerpColor(s1,s2,.5));g.addColorStop(1,s2);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

    const horizonY=H*.60;
    const hazeC={0:'rgba(10,15,35,0.22)',1:'rgba(200,95,30,0.30)',2:'rgba(60,100,160,0.15)',
                 3:'rgba(40,90,180,0.10)',4:'rgba(50,80,140,0.16)',5:'rgba(220,85,18,0.38)',
                 6:'rgba(8,12,30,0.28)',7:'rgba(5,8,20,0.32)'};
    const hc=hazeC[m]||hazeC[0];
    const haze=ctx.createRadialGradient(W/2,horizonY,0,W/2,horizonY,W*1.1);
    haze.addColorStop(0,hc);haze.addColorStop(.55,hc.replace(/[\d.]+\)$/,'0.06)'));haze.addColorStop(1,'transparent');
    ctx.fillStyle=haze;ctx.fillRect(0,0,W,H);

    if(m===1||m===5){
      const wc=m===1?'rgba(210,100,28,0.30)':'rgba(230,85,18,0.40)';
      const band=ctx.createLinearGradient(0,horizonY-H*.14,0,horizonY+H*.14);
      band.addColorStop(0,'transparent');band.addColorStop(.5,wc);band.addColorStop(1,'transparent');
      ctx.fillStyle=band;ctx.fillRect(0,horizonY-H*.14,W,H*.28);
    }
    drawGround(scene,horizonY);
  }

  function drawGround(scene,horizonY){
    const m=scene.moment;ctx.save();
    // Montaña lejana
    ctx.beginPath();ctx.moveTo(0,H);
    ctx.lineTo(0,horizonY*1.04);
    ctx.bezierCurveTo(W*.18,horizonY*.88,W*.35,horizonY*.94,W*.50,horizonY*.98);
    ctx.bezierCurveTo(W*.65,horizonY*1.02,W*.80,horizonY*.90,W,horizonY*.99);
    ctx.lineTo(W,H);ctx.closePath();
    const gm=ctx.createLinearGradient(0,horizonY*.9,0,H);
    gm.addColorStop(0,m>=1&&m<=5?'rgba(12,18,30,0.55)':'rgba(5,8,14,0.72)');
    gm.addColorStop(1,'rgba(2,3,8,0.98)');ctx.fillStyle=gm;ctx.fill();
    // Primer plano
    ctx.beginPath();ctx.moveTo(0,H);
    ctx.lineTo(0,horizonY*1.14);
    ctx.bezierCurveTo(W*.14,horizonY*1.02,W*.30,horizonY*1.10,W*.44,horizonY*1.12);
    ctx.bezierCurveTo(W*.58,horizonY*1.14,W*.72,horizonY*1.04,W*.88,horizonY*1.10);
    ctx.bezierCurveTo(W*.94,horizonY*1.13,W*.98,horizonY*1.12,W,horizonY*1.14);
    ctx.lineTo(W,H);ctx.closePath();
    const gf=ctx.createLinearGradient(0,horizonY*1.05,0,H);
    gf.addColorStop(0,'rgba(3,5,10,0.88)');gf.addColorStop(1,'rgba(1,2,5,1)');
    ctx.fillStyle=gf;ctx.fill();
    if(m===1||m===5){
      ctx.beginPath();ctx.moveTo(0,horizonY*1.14);
      ctx.bezierCurveTo(W*.14,horizonY*1.02,W*.30,horizonY*1.10,W*.44,horizonY*1.12);
      ctx.bezierCurveTo(W*.58,horizonY*1.14,W*.72,horizonY*1.04,W*.88,horizonY*1.10);
      ctx.bezierCurveTo(W*.94,horizonY*1.13,W*.98,horizonY*1.12,W,horizonY*1.14);
      ctx.strokeStyle=m===1?'rgba(200,110,40,0.18)':'rgba(210,80,18,0.24)';
      ctx.lineWidth=1.2;ctx.stroke();
    }
    const bot=ctx.createLinearGradient(0,H*.82,0,H);
    bot.addColorStop(0,'transparent');bot.addColorStop(1,'rgba(0,0,0,.95)');
    ctx.fillStyle=bot;ctx.fillRect(0,H*.82,W,H*.18);
    ctx.restore();
  }

  function drawSun(scene){
    if(!(scene.sun>0))return;
    const m=scene.moment,horizonY=H*.60;
    let sx,sy;
    if(m===1){sx=W*.68;sy=horizonY*.97}
    else if(m===2){sx=W*.78;sy=H*.18}
    else if(m===3){sx=W*.50;sy=H*.07}
    else if(m===4){sx=W*.24;sy=H*.18}
    else if(m===5){sx=W*.24;sy=horizonY*.96}
    else return;
    const sr=20*Math.min(scene.sun,1),isWarm=m===1||m===5;
    ctx.save();
    const atm=ctx.createRadialGradient(sx,sy,sr,sx,sy,sr*14);
    atm.addColorStop(0,isWarm?`rgba(255,200,80,${scene.sun*.22})`:`rgba(255,240,140,${scene.sun*.12})`);
    atm.addColorStop(.18,isWarm?`rgba(240,140,40,${scene.sun*.13})`:`rgba(240,220,100,${scene.sun*.07})`);
    atm.addColorStop(.5,isWarm?`rgba(200,80,20,${scene.sun*.05})`:`rgba(180,200,255,${scene.sun*.03})`);
    atm.addColorStop(1,'transparent');
    ctx.fillStyle=atm;ctx.beginPath();ctx.arc(sx,sy,sr*14,0,Math.PI*2);ctx.fill();
    const cor=ctx.createRadialGradient(sx,sy,sr,sx,sy,sr*4.5);
    cor.addColorStop(0,isWarm?`rgba(255,220,100,${scene.sun*.55})`:`rgba(255,240,160,${scene.sun*.45})`);
    cor.addColorStop(1,'transparent');
    ctx.fillStyle=cor;ctx.beginPath();ctx.arc(sx,sy,sr*4.5,0,Math.PI*2);ctx.fill();
    const disc=ctx.createRadialGradient(sx-sr*.3,sy-sr*.3,sr*.1,sx,sy,sr);
    disc.addColorStop(0,'#fffff8');disc.addColorStop(.4,isWarm?'#fff0c0':'#fff8e0');
    disc.addColorStop(1,isWarm?'#f08020':'#ffd060');
    ctx.globalAlpha=scene.sun*.95;ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fillStyle=disc;ctx.fill();
    ctx.restore();
  }

  function drawMoon(scene){
    if(!(scene.moon>0))return;
    const mx=W*.82,my=H*.09,mr=16*scene.moon;
    ctx.save();
    const oh=ctx.createRadialGradient(mx,my,mr*.8,mx,my,mr*8);
    oh.addColorStop(0,`rgba(200,220,210,${scene.moon*.12})`);oh.addColorStop(1,'transparent');
    ctx.fillStyle=oh;ctx.beginPath();ctx.arc(mx,my,mr*8,0,Math.PI*2);ctx.fill();
    const mh=ctx.createRadialGradient(mx,my,mr,mx,my,mr*3.5);
    mh.addColorStop(0,`rgba(220,235,225,${scene.moon*.20})`);mh.addColorStop(1,'transparent');
    ctx.fillStyle=mh;ctx.beginPath();ctx.arc(mx,my,mr*3.5,0,Math.PI*2);ctx.fill();
    const disc=ctx.createRadialGradient(mx-mr*.28,my-mr*.28,mr*.05,mx,my,mr);
    disc.addColorStop(0,'rgba(255,253,245,1)');disc.addColorStop(.5,'rgba(235,240,228,.97)');
    disc.addColorStop(1,'rgba(175,185,168,.88)');
    ctx.globalAlpha=Math.min(scene.moon*.95,.95);ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fillStyle=disc;ctx.fill();
    ctx.restore();
  }

  function render(){
    tick++;ctx.clearRect(0,0,W,H);
    if(!currentScene){requestAnimationFrame(render);return}
    drawSky(currentScene);
    ['aurora','fog','mist','cloud'].forEach(t=>particles.filter(p=>p.type===t).forEach(p=>{p.update(tick,currentScene);p.draw()}));
    drawMoon(currentScene);drawSun(currentScene);
    ['star','firefly','rain','snow','bird'].forEach(t=>particles.filter(p=>p.type===t).forEach(p=>{p.update(tick,currentScene);p.draw()}));
    const vg=ctx.createRadialGradient(W/2,H/2,H*.38,W/2,H/2,H*.88);
    vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.28)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    requestAnimationFrame(render);
  }

  function resize(){
    W=window.innerWidth;H=window.innerHeight;
    canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    ctx.setTransform(1,0,0,1,0,0);ctx.scale(devicePixelRatio,devicePixelRatio);
    if(currentScene)buildParticles(currentScene);
  }

  function updatePill(scene){
    $('pillIcon').textContent=scene.badge?scene.badge.split(' ')[0]:'🌙';
    $('pillName').textContent=scene.name||'';
    $('pillBadge').textContent=scene.badge||'';
  }

  let lastH=-1,lastD=-1;
  function checkTime(){
    const now=new Date(),h=now.getHours(),d=now.getDay(),m=hourToMoment(h);
    if(h!==lastH||d!==lastD){lastH=h;lastD=d;
      if(currentScene){
        const o=$('sceneTransOverlay');o.classList.add('fade');
        setTimeout(()=>{currentScene=getScene(d,m);buildParticles(currentScene);updatePill(currentScene);o.classList.remove('fade')},700);
      }else{currentScene=getScene(d,m);buildParticles(currentScene);updatePill(currentScene)}
    }
  }

  function init(){
    resize();window.addEventListener('resize',resize);
    const now=new Date();
    currentScene=getScene(now.getDay(),hourToMoment(now.getHours()));
    buildParticles(currentScene);updatePill(currentScene);
    render();setInterval(checkTime,60000);
  }
  return{init,getCurrentScene:()=>currentScene,PALETTES};
})();

/* ══════════ EASTER EGGS ══════════ */
const EASTER_EGGS=(()=>{
  function toast(msg){const t=$('easterToast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3800)}
  function shootingStar(){
    const dpr=devicePixelRatio||1,W=innerWidth,H=innerHeight;
    const c=document.createElement('canvas');
    c.width=W*dpr;c.height=H*dpr;
    c.style.cssText=`position:fixed;inset:0;z-index:3;pointer-events:none;width:${W}px;height:${H}px`;
    document.body.appendChild(c);
    const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
    const sx=Math.random()*W*.7+W*.2,sy=Math.random()*H*.25-20,angle=Math.PI*.18+Math.random()*.12;
    const len=Math.random()*180+120,speed=Math.random()*18+14;
    let dist=0,trail=[];
    function f(){ctx.clearRect(0,0,W,H);dist+=speed;
      const op=dist<60?dist/60:Math.max(0,1-(dist-len*.6)/(len*.4));
      const x=sx+Math.cos(angle+Math.PI)*dist,y=sy+Math.sin(angle+Math.PI)*dist;
      trail.unshift({x,y});if(trail.length>18)trail.pop();
      trail.forEach((pt,i)=>{const a=op*(1-i/trail.length)*.9,r=2.5*(1-i/trail.length);
        const g=ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,r*3);
        g.addColorStop(0,`rgba(255,255,255,${a})`);g.addColorStop(1,'transparent');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(pt.x,pt.y,r*3,0,Math.PI*2);ctx.fill()});
      if(dist<len+40)requestAnimationFrame(f);
      else{c.style.transition='opacity .5s';c.style.opacity='0';setTimeout(()=>c.remove(),600)}
    }requestAnimationFrame(f);
  }
  function trigger(scene){
    if(!scene)return;const m=scene.moment,p=BG.PALETTES[scene.key]||{};
    if((m===0||m===7)&&(p.stars||0)>.8){
      shootingStar();if(Math.random()<.4)setTimeout(shootingStar,700);
      if(Math.random()<.3)toast('💫 Lluvia de estrellas');
    }else if(m===1||m===5)toast('🦅 Bandada al horizonte');
    else if(m===3)toast('☀️ Sol en el cénit');
    else if(m===6){shootingStar();if(Math.random()<.5)setTimeout(shootingStar,900)}
  }
  function init(){
    let d=Math.random()*35000+30000;
    function sched(){setTimeout(()=>{trigger(BG.getCurrentScene());sched()},d=Math.random()*35000+30000)}
    sched();
    $('bgCanvas').addEventListener('click',e=>{if(e.clientY<innerHeight*.35)trigger(BG.getCurrentScene())});
  }
  return{init};
})();

function applyGreeting(){

  if(h>=6&&h<12){icon='🌅';text='Mañana Serena'}
  else if(h>=12&&h<18){icon='☀️';text='Tarde Luminosa'}

  $('timeGreeting').innerHTML=`<span>${icon}</span> ${text}`;
}
applyGreeting();setInterval(applyGreeting,60000);

/* ══════════ AUDIO ENGINE ══════════ */
let AC=null,masterGain=null,masterVolume=.8;
const audioBuffers={},state={},localVolumes={};
let bwNodes={gainL:null,gainR:null,oscL:null,oscR:null,mergerGain:null};
let bwVolume=.08;const BW_MAX=.25;

function initAudio(){
  if(!AC){AC=new(window.AudioContext||window.webkitAudioContext)();masterGain=AC.createGain();masterGain.gain.value=masterVolume;masterGain.connect(AC.destination)}
  if(AC.state==='suspended')AC.resume();
}
function organicLoop(){
  if(AC&&masterGain){const now=AC.currentTime;Object.keys(state).forEach(id=>{const s=state[id];if(!s)return;
    const pulse=Math.sin(now*s.mf1+s.mo)*.5+Math.sin(now*s.mf2)*.5;
    s.gain.gain.setTargetAtTime(Math.max(0,Math.min(1,localVolumes[id]*(1+pulse*.12))),now,.3)})
  }requestAnimationFrame(organicLoop);
}
organicLoop();

function updateBwUI(vol){
  const pct=vol/BW_MAX*100;
  const fill=$('bwSafeFill'),lbl=$('bwSafeLbl'),val=$('bwVolVal');
  if(fill)fill.style.width=`${pct}%`;
  if(val)val.textContent=`${Math.round(vol*100)}%`;
  if(lbl){
    if(pct<=40){lbl.textContent='SEGURO';lbl.style.color='#4ade80'}
    else if(pct<=72){lbl.textContent='MODERADO';lbl.style.color='#fbbf24'}
    else{lbl.textContent='ALTO';lbl.style.color='#f87171'}
  }
  const sl=$('bwSlider');if(sl)updateSlider(sl,'#a78bfa',0,BW_MAX);
}

function stopBrainwave(){
  if(!bwNodes.oscL)return;
  ['oscL','oscR'].forEach(k=>{try{bwNodes[k].stop()}catch(e){}});
  ['oscL','oscR','gainL','gainR','mergerGain'].forEach(k=>{try{bwNodes[k].disconnect()}catch(e){}});
  bwNodes={gainL:null,gainR:null,oscL:null,oscR:null,mergerGain:null};
  document.querySelectorAll('.bw-pill').forEach(b=>b.classList.remove('act'));
  $('bwVol').classList.remove('vis');$('bwSafeBar').classList.remove('vis');
}

/* Construir pills binaural */
const BW_DATA=[
  {hz:1.5,base:180,icon:'🌊',name:'Epsilon',use:'Sueño'},
  {hz:3,  base:180,icon:'🌑',name:'Delta',  use:'Regeneración'},
  {hz:4.5,base:200,icon:'🌫️',name:'Umbral', use:'Hipnagógico'},

];
const bwRow=$('bwPillsRow');
BW_DATA.forEach(d=>{
  const btn=document.createElement('button');
  btn.className='bw-pill';btn.dataset.hz=d.hz;btn.dataset.base=d.base;
  btn.innerHTML=`<span class="pdot"></span><span class="phz">${d.icon} ${d.hz}Hz</span><span class="pname">${d.name} · ${d.use}</span>`;
  btn.addEventListener('click',()=>{
    haptic();initAudio();
    const was=btn.classList.contains('act');
    stopBrainwave();if(was)return;
    btn.classList.add('act');$('bwVol').classList.add('vis');$('bwSafeBar').classList.add('vis');
    updateBwUI(bwVolume);
    const merger=AC.createChannelMerger(2);
    bwNodes.mergerGain=AC.createGain();bwNodes.mergerGain.gain.value=0;
    merger.connect(bwNodes.mergerGain);bwNodes.mergerGain.connect(masterGain);
    const base=parseFloat(d.base),hz=parseFloat(d.hz);
    bwNodes.oscL=AC.createOscillator();bwNodes.gainL=AC.createGain();bwNodes.gainL.gain.value=1;
    bwNodes.oscL.type='sine';bwNodes.oscL.frequency.value=base;
    bwNodes.oscL.connect(bwNodes.gainL);bwNodes.gainL.connect(merger,0,0);
    bwNodes.oscR=AC.createOscillator();bwNodes.gainR=AC.createGain();bwNodes.gainR.gain.value=1;
    bwNodes.oscR.type='sine';bwNodes.oscR.frequency.value=base+hz;
    bwNodes.oscR.connect(bwNodes.gainR);bwNodes.gainR.connect(merger,0,1);
    bwNodes.oscL.start();bwNodes.oscR.start();
    bwNodes.mergerGain.gain.linearRampToValueAtTime(bwVolume,AC.currentTime+.1);
  });
  bwRow.appendChild(btn);
});
$('bwSlider').addEventListener('input',e=>{
  bwVolume=Math.min(parseFloat(e.target.value),BW_MAX);e.target.value=bwVolume;
  updateBwUI(bwVolume);
  if(bwNodes.mergerGain&&AC)bwNodes.mergerGain.gain.setTargetAtTime(bwVolume,AC.currentTime,.1);
});
updateBwUI(bwVolume);

const presets={
  bosque:[{id:'s8',vol:.8},{id:'s4',vol:.5},{id:'s23',vol:.4}],
  cabana:[{id:'s12',vol:.9},{id:'s9',vol:.4},{id:'s5',vol:.3}],
  tibet: [{id:'s28',vol:.8},{id:'s15',vol:.5},{id:'s1',vol:.6}],
  rio:   [{id:'s17',vol:.7},{id:'s26',vol:.6},{id:'s21',vol:.3}],
  local: [],
};
function updateTimePreset(){
  const h=new Date().getHours();
  if(h>=6&&h<12)presets.local=[{id:'s4',vol:.6},{id:'s26',vol:.4},{id:'s1',vol:.3}];
  else if(h>=12&&h<18)presets.local=[{id:'s8',vol:.7},{id:'s25',vol:.5},{id:'s23',vol:.3}];
  else if(h>=18&&h<20)presets.local=[{id:'s9',vol:.5},{id:'s12',vol:.6}];
  else presets.local=[{id:'s9',vol:.7},{id:'s5',vol:.5},{id:'s2',vol:.4}];
}
updateTimePreset();

function updateActiveCount(){
  const n=Object.keys(state).length+(bwNodes.oscL?1:0);
  $('activeCount').textContent=n>0?`${n} activo${n>1?'s':''}`:'';
}

const mainGrid=$('mainGrid');
library.forEach(s=>{
  localVolumes[s.id]=.7;
  const card=document.createElement('div');
  card.className='card';card.id='card-'+s.id;
  card.style.setProperty('--card-color',s.color);
  card.innerHTML=`<div class="card-icon">${s.icon}</div><div class="card-vol-wrap"><input type="range" class="cslider" id="sl-${s.id}" min="0" max="1" step=".01" value=".7"></div>`;
  card.addEventListener('click',e=>{if(e.target.tagName==='INPUT')return;haptic();initAudio();state[s.id]?stopSound(s.id):startSound(s.id);clearPresetsUI();updateActiveCount()});
  const sl=card.querySelector('input');
  sl.addEventListener('input',e=>{e.stopPropagation();const v=parseFloat(e.target.value);localVolumes[s.id]=v;updateSlider(sl,s.color);if(state[s.id])state[s.id].gain.gain.setTargetAtTime(v,AC.currentTime,.05)});
  updateSlider(sl,s.color);
  mainGrid.appendChild(card);
});

function updateSlider(el,color,minOv,maxOv){
  const mn=minOv??parseFloat(el.min),mx=maxOv??parseFloat(el.max);
  const pct=(parseFloat(el.value)-mn)/(mx-mn)*100;
  el.style.background=`linear-gradient(to right,${color} ${pct}%,rgba(255,255,255,.1) ${pct}%)`;
}

async function startSound(id){
  if(state[id])return;
  const sd=library.find(s=>s.id===id);if(!sd)return;
  const card=$('card-'+id);
  try{
    if(!audioBuffers[id]){const res=await fetch(sd.url);if(!res.ok)throw new Error(res.status);audioBuffers[id]=await AC.decodeAudioData(await res.arrayBuffer())}
    card.classList.add('on');
    const g=AC.createGain();g.gain.value=localVolumes[id];g.connect(masterGain);
    const src=AC.createBufferSource();src.buffer=audioBuffers[id];src.loop=true;src.connect(g);src.start();
    state[id]={sourceObj:src,gain:g,mo:Math.random()*20,mf1:.1+Math.random()*.2,mf2:.3+Math.random()*.4};
  }catch(e){console.warn('Audio:',id,e);card.classList.remove('on')}
}
function stopSound(id){
  if(!state[id])return;
  const{sourceObj,gain}=state[id];
  gain.gain.setTargetAtTime(0,AC.currentTime,.3);
  setTimeout(()=>{try{sourceObj.stop();sourceObj.disconnect();gain.disconnect()}catch(e){}},600);
  delete state[id];$('card-'+id)?.classList.remove('on');
}
function stopAll(){
  haptic();[...Object.keys(state)].forEach(stopSound);
  stopBrainwave();clearPresetsUI();
  clearInterval(timerInt);$('tdisplay').textContent='';
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  updateActiveCount();
}
function clearPresetsUI(){document.querySelectorAll('.pre-btn').forEach(b=>b.classList.remove('act'))}

document.querySelectorAll('.pre-btn').forEach(btn=>{
  btn.addEventListener('click',async()=>{
    haptic();initAudio();stopAll();btn.classList.add('act');
    updateTimePreset();const mix=presets[btn.dataset.preset]||[];
    for(const item of mix){
      localVolumes[item.id]=item.vol;
      const sl=$('sl-'+item.id),sd=library.find(s=>s.id===item.id);
      if(sl&&sd){sl.value=item.vol;updateSlider(sl,sd.color)}
      await startSound(item.id);
    }updateActiveCount();
  });
});

const mVol=$('masterVol');
mVol.addEventListener('input',e=>{
  initAudio();masterVolume=parseFloat(e.target.value);
  updateSlider(mVol,'var(--primary)');
  if(masterGain)masterGain.gain.setTargetAtTime(masterVolume,AC.currentTime,.1);
});
updateSlider(mVol,'var(--primary)');

let timerInt=null;
document.querySelectorAll('.tbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    haptic();document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
    clearInterval(timerInt);$('tdisplay').textContent='';
    const mins=parseInt(btn.dataset.m);if(!mins)return;
    const end=Date.now()+mins*60000;
    timerInt=setInterval(()=>{
      const rem=end-Date.now();
      if(rem<=0){clearInterval(timerInt);stopAll();$('tdisplay').textContent='';return}
      const m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);
      $('tdisplay').textContent=`⏱ ${m}:${s.toString().padStart(2,'0')}`;
    },1000);
  });
});

$('btnStop').addEventListener('click',stopAll);
document.addEventListener('touchstart',()=>{if(AC&&AC.state==='suspended')AC.resume()},{once:true});
